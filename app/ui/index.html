<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #d4d4d4;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #7c6af7;
      letter-spacing: 0.08em;
    }

    #status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a1a1a;
      color: #555;
    }
    #status.connected { color: #4ec94e; background: #0e1f0e; }
    #status.error     { color: #e05252; background: #1f0e0e; }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .entry {
      padding: 8px 12px;
      border-radius: 4px;
      background: #111;
      border-left: 3px solid #2a2a2a;
    }
    .entry.system  { border-left-color: #444; }
    .entry.message { border-left-color: #7c6af7; }
    .entry.error   { border-left-color: #e05252; }

    .ts {
      font-size: 10px;
      color: #444;
      margin-bottom: 4px;
    }

    .body {
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      color: #c0c0c0;
    }
  </style>
</head>
<body>
  <header>
    <h1>jarvis</h1>
    <span id="status">connecting…</span>
  </header>
  <div id="log"></div>

  <script>
    const log    = document.getElementById('log');
    const status = document.getElementById('status');

    function append(text, type) {
      const el      = document.createElement('div');
      el.className  = 'entry' + (type ? ' ' + type : '');
      const ts      = document.createElement('div');
      ts.className  = 'ts';
      ts.textContent = new Date().toISOString();
      const body    = document.createElement('div');
      body.className = 'body';
      try { body.textContent = JSON.stringify(JSON.parse(text), null, 2); }
      catch { body.textContent = text; }
      el.append(ts, body);
      log.append(el);
      log.scrollTop = log.scrollHeight;
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws    = new WebSocket(proto + '://' + location.host + '/gateway-ws');

      ws.onopen = () => {
        status.textContent = '● connected';
        status.className   = 'connected';
        append('connected', 'system');
      };

      ws.onmessage = e => append(e.data, 'message');

      ws.onerror = () => {
        status.textContent = '● error';
        status.className   = 'error';
        append('websocket error', 'error');
      };

      ws.onclose = e => {
        status.textContent = '○ reconnecting…';
        status.className   = '';
        append('closed (code=' + e.code + ') — retrying in 3s', 'system');
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
