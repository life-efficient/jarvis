[build]
# Use Dockerfile for build
builder = "dockerfile"

[deploy]
# Start command - already in Dockerfile
startCommand = "bash /app/start.sh"

[[services]]
name = "jarvis"
build.dockerfile = "Dockerfile"

# Environment variables (set these in Railway dashboard)
# OPENAI_API_KEY
# ANTHROPIC_API_KEY
# TZ=Asia/Riyadh

# Volumes for persistence
volumes = [
  { sourceMount = "brain", destinationPath = "/app/brain" },
  { sourceMount = "memory", destinationPath = "/app/memory" },
  { sourceMount = "gbrain-db", destinationPath = "/app/.gbrain" }
]

[deploy.ports]
http = 3000
