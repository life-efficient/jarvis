version: '3.8'

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      SETUP_PASSWORD: ${SETUP_PASSWORD:-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
